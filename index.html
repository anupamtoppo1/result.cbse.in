<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secondary School Examination (Class X) Results 2024</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
        }
        .header {
            background-color: #01539D;
            color: white;
            padding: 20px;
            text-align: center;
            border-bottom: 5px solid #ff9933;
        }
        .header h1 {
            margin: 0;
            font-size: 22px;
            text-transform: uppercase;
        }
        .header h2 {
            margin: 5px 0;
            font-size: 18px;
            font-weight: normal;
        }
        .container {
            width: 90%;
            max-width: 600px;
            margin: 30px auto;
            background: white;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            border-radius: 4px;
        }
        .form-group {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }
        .form-group label {
            width: 40%;
            font-weight: bold;
            font-size: 14px;
            color: #333;
        }
        .form-group input {
            width: 60%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 3px;
        }
        .captcha-box {
            background: #eee;
            padding: 10px;
            font-weight: bold;
            letter-spacing: 5px;
            font-style: italic;
            user-select: none;
            display: inline-block;
            margin-bottom: 10px;
            border: 1px dashed #666;
        }
        .buttons {
            text-align: center;
            margin-top: 20px;
        }
        .btn {
            padding: 10px 25px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            margin: 0 5px;
        }
        .btn-submit { background-color: #01539D; color: white; }
        .btn-reset { background-color: #ccc; color: #333; }
        
        #video-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 1000;
        }
        video {
            width: 100%;
            height: 100%;
        }
        .footer {
            margin-top: 50px;
            text-align: center;
            font-size: 12px;
            color: #666;
        }
        .official-img {
            height: 60px;
            vertical-align: middle;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Central Board of Secondary Education</h1>
        <h2>Secondary School Examination (Class X) Results 2024</h2>
    </div>

    <div class="container" id="main-content">
        <h3 style="color: #01539D; border-bottom: 1px solid #ccc; padding-bottom: 10px;">Enter your Details</h3>
        
        <form id="resultForm">
            <div class="form-group">
                <label>Enter Roll Number:</label>
                <input type="text" required maxlength="8">
            </div>
            <div class="form-group">
                <label>Enter School No.:</label>
                <input type="text" required>
            </div>
            <div class="form-group">
                <label>Enter Date of Birth:</label>
                <input type="date" required>
            </div>
            <div class="form-group">
                <label>Enter Admit Card ID:</label>
                <input type="text" required>
            </div>

            <div style="text-align: center; margin-top: 20px;">
                <div class="captcha-box">R 8 X 2 Q P</div><br>
                <input type="text" placeholder="Enter Captcha" style="padding: 8px; width: 150px;">
            </div>

            <div class="buttons">
                <button type="submit" class="btn btn-submit">Submit</button>
                <button type="reset" class="btn btn-reset">Reset</button>
            </div>
        </form>
    </div>

    <div class="footer">
        <p>Designed, Developed and Hosted by National Informatics Centre (NIC)</p>
        <p>© Content Owned by Central Board of Secondary Education (CBSE)</p>
    </div>

    <!-- Prank Video Container -->
    <div id="video-container">
        <video id="prankVideo">
            <source src="video.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <script>
        document.getElementById('resultForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Stop the form from actually submitting
            
            const mainContent = document.getElementById('main-content');
            const videoContainer = document.getElementById('video-container');
            const video = document.getElementById('prankVideo');

            // Hide the form and show video
            videoContainer.style.display = 'block';
            
            // Go full screen for maximum effect
            if (videoContainer.requestFullscreen) {
                videoContainer.requestFullscreen();
            } else if (videoContainer.webkitRequestFullscreen) {
                videoContainer.webkitRequestFullscreen();
            }

            video.play();
        });

        // Close full screen when video ends or if user escapes
        document.getElementById('prankVideo').onended = function() {
            document.exitFullscreen();
            document.getElementById('video-container').style.display = 'none';
        };
    </script>
</body>
</html>
